<!DOCTYPE html>
<html>
<head>
<title>Álbum de Figurinhas</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

h1{
color:#333;
}

.album{
display:grid;
grid-template-columns:repeat(5,120px);
gap:10px;
justify-content:center;
margin-top:20px;
}

.slot{
width:120px;
height:160px;
background:white;
border:2px dashed #999;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

button{
padding:10px 20px;
font-size:18px;
margin-top:20px;
}
</style>
</head>

<body>

<h1>📖 Álbum de Figurinhas</h1>

<button onclick="abrirPacote()">Abrir Pacotinho</button>

<h2>Figurinhas recebidas:</h2>
<div id="resultado"></div>

<h2>Meu Álbum</h2>

<div class="album" id="album"></div>

<script>

let totalFigurinhas = 30
let colecao = []

function abrirPacote(){

let pacote = []

for(let i=0;i<5;i++){

let figurinha = Math.floor(Math.random()*totalFigurinhas)+1

pacote.push(figurinha)
colecao.push(figurinha)

}

document.getElementById("resultado").innerHTML =
pacote.join(", ")

mostrarAlbum()

}

function mostrarAlbum(){

let html=""

for(let i=1;i<=totalFigurinhas;i++){

if(colecao.includes(i)){
html += `<div class="slot">🖼 ${i}</div>`
}else{
html += `<div class="slot">${i}</div>`
}

}

document.getElementById("album").innerHTML = html

}

mostrarAlbum()

</script>

</body>
</html>
